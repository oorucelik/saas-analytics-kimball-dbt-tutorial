version: 2

models:
  - name: rpt_churn_reason_summary
    description: "Churn reason summary report"
    columns:
      - name: churn_event_count
        description: "Count of churn events"
      - name: churn_reason
        description: "Reason for churn"
        
  - name: rpt_corr_support_churn
    description: "Correlation between support tickets and churn"
    columns:
      - name: total_tickets
        description: "Count of support tickets"
      - name: total_churn
        description: "Count of churn events"
      - name: correlation
        description: "Correlation between support tickets and churn"

  - name: rpt_conversion_summary
    description: "Conversion summary report"
    columns:
      - name: conversion_event_count
        description: "Count of conversion events"
      - name: conversion_reason
        description: "Reason for conversion"

  
  - name: rpt_monthly_mrr_by_plan_tier
    description: "Monthly MRR by plan tier report"
    columns:
      - name: month
        description: "Month"
      - name: plan_tier
        description: "Plan tier"
      - name: mrr
        description: "Monthly recurring revenue"
        
  - name: rpt_feature_adoption_least
    description: "Least used features report"
    columns:
      - name: feature_name
        description: "Feature name"
      - name: adoption_rate
        description: "Adoption rate"

  - name: rpt_feature_adoption_most
    description: "Most used features report"
